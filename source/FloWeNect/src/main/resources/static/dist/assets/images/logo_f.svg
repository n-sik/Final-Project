<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 44" fill="none">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="flowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- 아이콘: 연결된 노드 (flow + network) -->
  <g transform="translate(0, 4)">
    <!-- 연결선 -->
    <line x1="9" y1="9" x2="20" y2="18" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="18" x2="9" y2="27" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="20" y1="18" x2="30" y2="18" stroke="url(#iconGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <!-- 노드 -->
    <circle cx="9" cy="9" r="3.5" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="9" cy="27" r="3.5" fill="url(#iconGrad)" opacity="0.5"/>
    <circle cx="30" cy="18" r="3.5" fill="url(#iconGrad)"/>
    <circle cx="20" cy="18" r="4.5" fill="url(#iconGrad)"/>
  </g>

  <!-- 텍스트: FloWeNect -->
  <!-- Flo = 일반 굵기, We = 강조(그라데이션), Nect = 일반 굵기 -->
  <text font-family="'SCDream', 'Pretendard', sans-serif" font-size="17" letter-spacing="-0.3" font-weight="300" fill="#1a1d23">
    <tspan x="42" y="28">Flo</tspan>
  </text>
  <text font-family="'SCDream', 'Pretendard', sans-serif" font-size="17" letter-spacing="-0.3" font-weight="700" fill="url(#flowGrad)">
    <tspan x="71" y="28">We</tspan>
  </text>
  <text font-family="'SCDream', 'Pretendard', sans-serif" font-size="17" letter-spacing="-0.3" font-weight="300" fill="#1a1d23">
    <tspan x="98" y="28">Nect</tspan>
  </text>
</svg>
